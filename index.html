<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>あらすじ検索 - 作家で探す小説</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=Shippori+Mincho:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1008;
    --paper: #f5f0e8;
    --cream: #ede8dc;
    --accent: #c0392b;
    --accent2: #e67e22;
    --muted: #7a6f62;
    --border: #c8b99a;
    --card-bg: #faf7f2;
    --shadow: rgba(26, 16, 8, 0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: "Shippori Mincho", serif;
    min-height: 100vh;
  }

  header {
    background: var(--ink);
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 3px solid var(--accent);
  }

  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 18px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .logo {
    font-family: "Zen Kaku Gothic New", sans-serif;
    font-weight: 900;
    font-size: 1.5rem;
    color: var(--paper);
    letter-spacing: 0.05em;
    white-space: nowrap;
  }

  .logo span { color: var(--accent); }

  .search-row {
    display: flex;
    gap: 8px;
    flex: 1;
    min-width: 280px;
  }

  .search-input,
  .search-select,
  .sort-select {
    flex: 1;
    min-width: 0;
    padding: 10px 16px;
    font-family: "Zen Kaku Gothic New", sans-serif;
    font-size: 1rem;
    background: #2a1f14;
    border: 1px solid #4a3828;
    border-radius: 4px;
    color: var(--paper);
    outline: none;
    transition: border-color 0.2s;
  }

  .search-select {
    flex: 0 0 150px;
    cursor: pointer;
  }

  .search-input::placeholder { color: #b79f88; }
  .search-input:focus { border-color: var(--accent); }
  .search-select:focus,
  .sort-select:focus { border-color: var(--accent); }

  .search-btn {
    padding: 10px 22px;
    background: var(--accent);
    color: #fff;
    border: 0;
    border-radius: 4px;
    font-family: "Zen Kaku Gothic New", sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s, transform 0.1s;
  }

  .search-btn:hover { background: #a93226; }
  .search-btn:active { transform: scale(0.97); }
  .search-btn:disabled { cursor: wait; opacity: 0.75; }

  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 32px 24px 64px;
  }

  .status-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }

  .status-author {
    font-family: "Zen Kaku Gothic New", sans-serif;
    font-size: 1.4rem;
    font-weight: 900;
  }

  .status-count {
    font-size: 0.9rem;
    color: var(--muted);
  }

  .status-spacer {
    flex: 1;
    min-width: 16px;
  }

  .sort-control {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: "Zen Kaku Gothic New", sans-serif;
    font-size: 0.82rem;
    color: var(--muted);
  }

  .sort-select {
    flex: 0 0 auto;
    min-width: 150px;
    padding: 7px 10px;
    background: var(--card-bg);
    border-color: var(--border);
    color: var(--ink);
    cursor: pointer;
  }

  .hidden { display: none !important; }

  .grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 16px;
  }

  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    display: flex;
    flex-direction: row;
    min-height: 220px;
    min-width: 0;
    transition: box-shadow 0.2s, transform 0.2s;
    animation: fadeIn 0.3s ease both;
  }

  .card:hover {
    box-shadow: 0 6px 24px var(--shadow);
    transform: translateY(-2px);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-cover {
    width: 180px;
    min-width: 180px;
    aspect-ratio: auto;
    object-fit: contain;
    background: var(--cream);
    display: block;
    border-right: 1px solid var(--border);
  }

  .card-cover-link {
    width: 180px;
    min-width: 180px;
    display: flex;
    background: var(--cream);
    border-right: 1px solid var(--border);
  }

  .card-cover-link .card-cover {
    width: 100%;
    min-width: 0;
    border-right: 0;
  }

  .card-cover.placeholder {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.5rem;
    color: var(--border);
  }

  .card-main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  .card-body {
    padding: 16px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .card-title {
    font-family: "Zen Kaku Gothic New", sans-serif;
    font-weight: 700;
    font-size: 1rem;
    line-height: 1.4;
  }

  .card-meta {
    font-size: 0.78rem;
    color: var(--muted);
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .card-meta span::before {
    content: "・";
    margin-right: 4px;
    opacity: 0.4;
  }

  .card-meta span:first-child::before {
    content: "";
    margin: 0;
  }

  .author-link {
    background: transparent;
    border: 0;
    color: var(--accent);
    cursor: pointer;
    font: inherit;
    padding: 0;
    text-decoration: underline;
    text-underline-offset: 2px;
  }

  .author-link:hover {
    color: #a93226;
  }

  .card-synopsis {
    font-size: 0.88rem;
    line-height: 1.75;
    color: #3a2e22;
    flex: 1;
    display: -webkit-box;
    -webkit-line-clamp: 6;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-synopsis.expanded {
    display: block;
    -webkit-line-clamp: unset;
    overflow: visible;
  }

  .synopsis-toggle {
    align-self: flex-start;
    margin-top: 2px;
    padding: 4px 0;
    background: transparent;
    border: 0;
    color: var(--accent);
    cursor: pointer;
    font-family: "Zen Kaku Gothic New", sans-serif;
    font-size: 0.82rem;
    font-weight: 700;
    text-decoration: underline;
    text-underline-offset: 3px;
  }

  .synopsis-toggle:hover {
    color: #a93226;
  }

  .synopsis-toggle.hidden {
    display: none;
  }

  .card-footer {
    padding: 12px 16px;
    border-top: 1px solid var(--cream);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .price {
    font-family: "Zen Kaku Gothic New", sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--accent);
  }

  .buy-btn {
    display: inline-block;
    padding: 7px 16px;
    background: var(--accent2);
    color: #fff;
    text-decoration: none;
    border-radius: 4px;
    font-family: "Zen Kaku Gothic New", sans-serif;
    font-size: 0.82rem;
    font-weight: 700;
    transition: background 0.15s;
    white-space: nowrap;
  }

  .buy-btn:hover { background: #cf6d17; }

  .state-box {
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
  }

  .state-box .icon {
    font-size: 3rem;
    margin-bottom: 16px;
    display: block;
  }

  .state-box p {
    font-size: 1rem;
    line-height: 1.8;
  }

  .state-box strong {
    color: var(--ink);
    font-family: "Zen Kaku Gothic New", sans-serif;
  }

  .loading-dots span {
    display: inline-block;
    width: 8px;
    height: 8px;
    background: var(--accent);
    border-radius: 50%;
    margin: 0 3px;
    animation: bounce 1s infinite;
  }

  .loading-dots span:nth-child(2) { animation-delay: 0.15s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.3s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-8px); }
  }

  .api-note {
    background: #fff8e1;
    border: 1px solid #f9c74f;
    border-radius: 6px;
    padding: 14px 18px;
    margin-bottom: 28px;
    font-size: 0.85rem;
    line-height: 1.7;
    color: #5a4a00;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }

  .api-note .icon {
    font-size: 1.1rem;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .site-version {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px 24px;
    color: var(--muted);
    font-family: "Zen Kaku Gothic New", sans-serif;
    font-size: 0.78rem;
    text-align: right;
  }

  .pagination {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 28px;
  }

  .page-btn {
    min-width: 36px;
    height: 36px;
    padding: 0 10px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--card-bg);
    color: var(--ink);
    cursor: pointer;
    font-family: "Zen Kaku Gothic New", sans-serif;
    font-weight: 700;
  }

  .page-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .page-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .page-btn:disabled {
    cursor: default;
    opacity: 0.45;
  }

  code {
    background: #ede8dc;
    padding: 1px 5px;
    border-radius: 3px;
    font-family: monospace;
    font-size: 0.9em;
  }

  @media (max-width: 600px) {
    .header-inner {
      padding: 14px 16px;
      gap: 12px;
    }

    .logo { font-size: 1.2rem; }
    .search-row { min-width: 100%; flex-wrap: wrap; }
    .search-select { flex: 1 1 100%; }
    main { padding: 20px 16px 48px; }
    .card {
      flex-direction: column;
      min-height: 0;
    }

    .card-cover {
      width: 100%;
      min-width: 0;
      aspect-ratio: auto;
      border-right: 0;
      border-bottom: 1px solid var(--border);
    }

    .card-cover-link {
      width: 100%;
      min-width: 0;
      border-right: 0;
      border-bottom: 1px solid var(--border);
    }

    .card-cover-link .card-cover {
      max-height: none;
      border-bottom: 0;
    }

    .sort-control { width: 100%; }
  }
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <div class="logo">あらすじ<span>検索</span></div>
    <div class="search-row">
      <select class="search-select" id="searchMode" aria-label="検索種別">
        <option value="author">作家で検索</option>
        <option value="synopsis">あらすじで検索</option>
      </select>
      <input class="search-input" id="searchInput" type="text" placeholder="作家名を入力" autocomplete="off">
      <button class="search-btn" id="searchBtn" type="button">検索</button>
    </div>
  </div>
</header>

<main>
  <div class="api-note hidden" id="apiNote">
    <span class="icon">!</span>
    <div>
      <strong>デモモード</strong> 現在はサンプルデータで動作しています。
      楽天Webサービスで <code>APP_ID</code> と <code>ACCESS_KEY</code> を取得し、スクリプト先頭の設定を書き換えると楽天ブックスAPIから実データを取得できます。
    </div>
  </div>

  <div class="status-bar hidden" id="statusBar">
    <span class="status-author" id="statusAuthor"></span>
    <span class="status-count" id="statusCount"></span>
    <span class="status-spacer"></span>
    <label class="sort-control">
      並び順
      <select class="sort-select" id="sortSelect">
        <option value="date-desc">年月日 降順</option>
        <option value="date-asc">年月日 昇順</option>
      </select>
    </label>
  </div>

  <div id="content">
    <div class="state-box">
      <span class="icon">⌕</span>
      <p>作家名を入力して検索すると<br>小説の作品一覧とあらすじが表示されます。</p>
    </div>
  </div>

  <div class="pagination hidden" id="pagination"></div>
</main>

<footer class="site-version">ver.9</footer>

<script>
// Rakuten Web ServiceのapplicationIdとaccessKeyを入れると実データ検索になります。
// ACCESS_KEYが空のままなら下のサンプルデータで動きます。
const APP_ID = "d77d6759-3260-43eb-81b7-fd153a98e8ba";
const ACCESS_KEY = "pk_cZyQUwzuxXMcTXs6gq5JaFSDLmIQTKkRZWxmU2mXnsz";
const AFFILIATE_ID = "54aa3625.ee1bf9ab.54aa3626.b59c4a5f";

const DEMO_DATA = {
  "東野圭吾": [
    {
      title: "容疑者Xの献身",
      author: "東野圭吾",
      publisher: "文藝春秋",
      publishedDate: "2008-08",
      price: 858,
      synopsis: "天才数学者で高校教師の石神は、隣人の花岡靖子が起こした事件を知り、完全なアリバイ工作を仕掛ける。湯川学が挑む、愛と論理のミステリー。",
      url: "https://books.rakuten.co.jp/",
      image: ""
    },
    {
      title: "白夜行",
      author: "東野圭吾",
      publisher: "集英社",
      publishedDate: "2002-08",
      price: 1045,
      synopsis: "大阪の質屋殺しを発端に、被害者の息子と容疑者の娘の人生が交差していく。長い歳月をかけて闇の中を歩む二人を描く長編小説。",
      url: "https://books.rakuten.co.jp/",
      image: ""
    },
    {
      title: "手紙",
      author: "東野圭吾",
      publisher: "文藝春秋",
      publishedDate: "2006-10",
      price: 748,
      synopsis: "強盗殺人を犯した兄を持つ弟に、毎月刑務所から手紙が届く。加害者家族として生きる苦しみと社会のまなざしを描く作品。",
      url: "https://books.rakuten.co.jp/",
      image: ""
    }
  ],
  "村上春樹": [
    {
      title: "ノルウェイの森",
      author: "村上春樹",
      publisher: "講談社",
      publishedDate: "2004-09",
      price: 836,
      synopsis: "1960年代末、大学生のワタナベは親友の死をきっかけに直子と向き合う。喪失と再生、青春の痛みを静かに描いた長編小説。",
      url: "https://books.rakuten.co.jp/",
      image: ""
    },
    {
      title: "1Q84",
      author: "村上春樹",
      publisher: "新潮社",
      publishedDate: "2012-10",
      price: 1034,
      synopsis: "1984年の東京から、二つの月が浮かぶもうひとつの世界へ。青豆と天吾の物語が交錯する壮大な長編。",
      url: "https://books.rakuten.co.jp/",
      image: ""
    }
  ]
};

const searchMode = document.getElementById("searchMode");
const searchInput = document.getElementById("searchInput");
const searchBtn = document.getElementById("searchBtn");
const content = document.getElementById("content");
const statusBar = document.getElementById("statusBar");
const statusAuthor = document.getElementById("statusAuthor");
const statusCount = document.getElementById("statusCount");
const sortSelect = document.getElementById("sortSelect");
const pagination = document.getElementById("pagination");
const apiNote = document.getElementById("apiNote");

const ITEMS_PER_PAGE = 30;
let currentBooks = [];
let currentQuery = "";
let currentMode = "author";
let currentPage = 1;
let currentPageCount = 1;
let currentTotalCount = 0;

if (!APP_ID || !ACCESS_KEY) {
  apiNote.classList.remove("hidden");
}

searchMode.addEventListener("change", updateSearchPlaceholder);
searchBtn.addEventListener("click", doSearch);
searchInput.addEventListener("keydown", event => {
  if (event.key === "Enter") doSearch();
});
sortSelect.addEventListener("change", () => {
  if (currentBooks.length === 0) return;
  render(currentQuery, currentBooks, currentMode, {
    page: currentPage,
    pageCount: currentPageCount,
    totalCount: currentTotalCount
  });
});

pagination.addEventListener("click", event => {
  const button = event.target.closest(".page-btn");
  if (!button || button.disabled) return;

  const page = Number(button.dataset.page);
  if (!page || page === currentPage) return;

  goToPage(page);
});

updateSearchPlaceholder();

content.addEventListener("click", event => {
  const authorLink = event.target.closest(".author-link");
  if (authorLink) {
    searchMode.value = "author";
    searchInput.value = authorLink.dataset.author || authorLink.textContent.trim();
    updateSearchPlaceholder();
    doSearch();
    window.scrollTo({ top: 0, behavior: "smooth" });
    return;
  }

  const toggle = event.target.closest(".synopsis-toggle");
  if (!toggle) return;

  const synopsis = toggle.previousElementSibling;
  const expanded = toggle.getAttribute("aria-expanded") === "true";
  synopsis.classList.toggle("expanded", !expanded);
  toggle.setAttribute("aria-expanded", String(!expanded));
  toggle.textContent = expanded ? "すべてを表示" : "閉じる";
});

function updateSearchPlaceholder() {
  searchInput.placeholder = searchMode.value === "synopsis"
    ? "あらすじのキーワードを入力"
    : "作家名を入力";
}

function doSearch() {
  if (searchMode.value === "synopsis") {
    doSynopsisSearch();
    return;
  }

  doAuthorSearch();
}

async function doAuthorSearch() {
  const author = searchInput.value.trim();
  if (!author) return;
  currentPage = 1;

  showLoading();
  searchBtn.disabled = true;

  try {
    const result = APP_ID && ACCESS_KEY
      ? await fetchRakuten(author, currentPage)
      : paginateBooks(getDemoData(author), currentPage);
    render(author, result.books, "author", result);
  } catch (error) {
    showError(error.message || "検索に失敗しました。");
  } finally {
    searchBtn.disabled = false;
  }
}

async function doSynopsisSearch() {
  const keyword = searchInput.value.trim();
  if (!keyword) return;
  currentPage = 1;

  showLoading();
  searchBtn.disabled = true;

  try {
    const result = APP_ID && ACCESS_KEY
      ? await fetchRakutenByKeyword(keyword, currentPage)
      : paginateBooks(filterBooksBySynopsis(getAllDemoData(), keyword), currentPage);
    render(keyword, result.books, "synopsis", result);
  } catch (error) {
    showError(error.message || "検索に失敗しました。");
  } finally {
    searchBtn.disabled = false;
  }
}

async function goToPage(page) {
  const query = currentQuery;
  if (!query) return;

  currentPage = page;
  showLoading();
  searchBtn.disabled = true;

  try {
    const result = currentMode === "synopsis"
      ? (APP_ID && ACCESS_KEY
        ? await fetchRakutenByKeyword(query, currentPage)
        : paginateBooks(filterBooksBySynopsis(getAllDemoData(), query), currentPage))
      : (APP_ID && ACCESS_KEY
        ? await fetchRakuten(query, currentPage)
        : paginateBooks(getDemoData(query), currentPage));

    render(query, result.books, currentMode, result);
    window.scrollTo({ top: 0, behavior: "smooth" });
  } catch (error) {
    showError(error.message || "検索に失敗しました。");
  } finally {
    searchBtn.disabled = false;
  }
}

async function fetchRakuten(author, page = 1) {
  const params = new URLSearchParams({
    applicationId: APP_ID,
    accessKey: ACCESS_KEY,
    author,
    booksGenreId: "001004",
    hits: "30",
    page: String(page),
    format: "json"
  });

  if (AFFILIATE_ID) params.set("affiliateId", AFFILIATE_ID);

  let response;
  try {
    response = await fetch(`https://openapi.rakuten.co.jp/services/api/BooksBook/Search/20170404?${params.toString()}`, {
      method: "GET",
      mode: "cors",
      referrerPolicy: "strict-origin-when-cross-origin"
    });
  } catch (error) {
    throw new Error("楽天APIに接続できませんでした。アップロード先のURLを楽天Webサービスのアプリ設定で許可済みWebサイトに登録してください。file://で直接開いている場合は実API検索できません。");
  }

  const data = await response.json().catch(() => null);

  if (!response.ok) {
    const apiError = data?.errors?.errorMessage || data?.error_description || response.statusText;
    throw new Error(formatRakutenError(apiError));
  }

  if (data?.error || data?.errors) {
    const apiError = data.error_description || data.errors?.errorMessage || data.error;
    throw new Error(formatRakutenError(apiError));
  }

  return {
    books: normalizeRakutenItems(data),
    page: Number(data.page || page),
    pageCount: Number(data.pageCount || 1),
    totalCount: Number(data.count || 0)
  };
}

async function fetchRakutenByKeyword(keyword, page = 1) {
  const params = new URLSearchParams({
    applicationId: APP_ID,
    accessKey: ACCESS_KEY,
    keyword,
    booksGenreId: "001004",
    hits: "30",
    page: String(page),
    format: "json"
  });

  if (AFFILIATE_ID) params.set("affiliateId", AFFILIATE_ID);

  let response;
  try {
    response = await fetch(`https://openapi.rakuten.co.jp/services/api/BooksTotal/Search/20170404?${params.toString()}`, {
      method: "GET",
      mode: "cors",
      referrerPolicy: "strict-origin-when-cross-origin"
    });
  } catch (error) {
    throw new Error("楽天APIに接続できませんでした。アップロード先のURLを楽天Webサービスのアプリ設定で許可済みWebサイトに登録してください。file://で直接開いている場合は実API検索できません。");
  }

  const data = await response.json().catch(() => null);

  if (!response.ok) {
    const apiError = data?.errors?.errorMessage || data?.error_description || response.statusText;
    throw new Error(formatRakutenError(apiError));
  }

  if (data?.error || data?.errors) {
    const apiError = data.error_description || data.errors?.errorMessage || data.error;
    throw new Error(formatRakutenError(apiError));
  }

  const books = normalizeRakutenItems(data).filter(book => normalizeText(book.synopsis).includes(normalizeText(keyword)));

  return {
    books,
    page: Number(data.page || page),
    pageCount: Number(data.pageCount || 1),
    totalCount: Number(data.count || books.length)
  };
}

function normalizeRakutenItems(data) {
  return (data.Items || []).map(({ Item }) => ({
    title: Item.title,
    author: Item.author,
    publisher: Item.publisherName,
    publishedDate: Item.salesDate,
    price: Item.itemPrice,
    synopsis: Item.itemCaption || "あらすじは登録されていません。",
    url: Item.affiliateUrl || Item.itemUrl,
    image: Item.largeImageUrl || Item.mediumImageUrl || ""
  }));
}

function formatRakutenError(message) {
  const text = String(message || "");
  if (text.includes("REQUEST_CONTEXT_BODY_HTTP_REFERRER_MISSING")) {
    return "楽天APIが呼び出し元URLを確認できませんでした。file://ではなくアップロード先URLで開いてください。";
  }

  if (text.includes("HTTP_REFERRER_NOT_ALLOWED")) {
    return "楽天APIでこのサイトURLが許可されていません。楽天Webサービスのアプリ設定で、アップロード先のドメインを許可済みWebサイトに追加してください。";
  }

  if (text.includes("applicationId")) {
    return "楽天APIのapplicationIdが無効です。楽天Webサービスで取得した有効なapplicationIdをAPP_IDに設定してください。";
  }

  if (text.includes("accessKey")) {
    return "楽天APIのaccessKeyが無効です。楽天Webサービスで取得した有効なaccessKeyをACCESS_KEYに設定してください。";
  }

  return text || "楽天APIの呼び出しに失敗しました。";
}

function getDemoData(author) {
  const key = Object.keys(DEMO_DATA).find(name => name.includes(author) || author.includes(name));
  return key ? DEMO_DATA[key] : [];
}

function getAllDemoData() {
  return Object.values(DEMO_DATA).flat();
}

function filterBooksBySynopsis(books, keyword) {
  const normalizedKeyword = normalizeText(keyword);
  return books.filter(book => normalizeText(book.synopsis).includes(normalizedKeyword));
}

function paginateBooks(books, page = 1) {
  const pageCount = Math.max(1, Math.ceil(books.length / ITEMS_PER_PAGE));
  const safePage = Math.min(Math.max(1, page), pageCount);
  const start = (safePage - 1) * ITEMS_PER_PAGE;

  return {
    books: books.slice(start, start + ITEMS_PER_PAGE),
    page: safePage,
    pageCount,
    totalCount: books.length
  };
}

function normalizeText(value) {
  return String(value ?? "").toLocaleLowerCase("ja-JP");
}

function render(query, books, mode = "author", meta = {}) {
  currentBooks = books;
  currentQuery = query;
  currentMode = mode;
  currentPage = Number(meta.page || currentPage || 1);
  currentPageCount = Number(meta.pageCount || 1);
  currentTotalCount = Number(meta.totalCount || books.length);

  statusBar.classList.remove("hidden");
  statusAuthor.textContent = mode === "synopsis" ? `あらすじ: ${query}` : query;
  statusCount.textContent = currentTotalCount > 0
    ? `${currentTotalCount}件中 ${getPageStart(currentPage, books.length)}-${getPageEnd(currentPage, books.length)}件`
    : "";

  if (books.length === 0) {
    const emptyText = mode === "synopsis"
      ? `あらすじに「${escHtml(query)}」を含む作品が見つかりませんでした。`
      : `「${escHtml(query)}」の作品が見つかりませんでした。`;
    content.innerHTML = `
      <div class="state-box">
        <span class="icon">?</span>
        <p><strong>${emptyText}</strong><br>キーワードを変えて、もう一度検索してください。</p>
      </div>`;
    renderPagination();
    return;
  }

  const sortedBooks = sortBooksByDate(books, sortSelect.value);
  const cards = sortedBooks.map((book, index) => `
    <div class="card" style="animation-delay:${index * 0.04}s">
      ${book.image
        ? `<a class="card-cover-link" href="${escAttr(book.url)}" target="_blank" rel="noopener"><img class="card-cover" src="${escAttr(book.image)}" alt="${escAttr(book.title)}" loading="lazy"></a>`
        : `<div class="card-cover placeholder">本</div>`}
      <div class="card-main">
        <div class="card-body">
          <div class="card-title"><a href="${escAttr(book.url)}" target="_blank" rel="noopener">${escHtml(book.title)}</a></div>
          <div class="card-meta">
            <span>${renderAuthorLinks(book.author)}</span>
            ${book.publisher ? `<span>${escHtml(book.publisher)}</span>` : ""}
            ${book.publishedDate ? `<span>${escHtml(book.publishedDate)}</span>` : ""}
          </div>
          <div class="card-synopsis">${escHtml(book.synopsis)}</div>
          <button class="synopsis-toggle hidden" type="button" aria-expanded="false">すべてを表示</button>
        </div>
        <div class="card-footer">
          <span class="price">${book.price ? `¥${Number(book.price).toLocaleString()}` : ""}</span>
          <a class="buy-btn" href="${escAttr(book.url)}" target="_blank" rel="noopener">楽天で見る</a>
        </div>
      </div>
    </div>
  `).join("");

  content.innerHTML = `<div class="grid">${cards}</div>`;
  revealOverflowingSynopsisToggles();
  renderPagination();
}

function getPageStart(page, itemCount) {
  if (itemCount === 0) return 0;
  return (page - 1) * ITEMS_PER_PAGE + 1;
}

function getPageEnd(page, itemCount) {
  return (page - 1) * ITEMS_PER_PAGE + itemCount;
}

function renderPagination() {
  if (currentPageCount <= 1) {
    pagination.classList.add("hidden");
    pagination.innerHTML = "";
    return;
  }

  const pages = getVisiblePages(currentPage, currentPageCount);
  const pageButtons = pages.map(page => {
    if (page === "...") return `<span class="page-ellipsis">...</span>`;
    return `<button class="page-btn${page === currentPage ? " active" : ""}" type="button" data-page="${page}" ${page === currentPage ? "disabled" : ""}>${page}</button>`;
  }).join("");

  pagination.innerHTML = `
    <button class="page-btn" type="button" data-page="${currentPage - 1}" ${currentPage <= 1 ? "disabled" : ""}>前へ</button>
    ${pageButtons}
    <button class="page-btn" type="button" data-page="${currentPage + 1}" ${currentPage >= currentPageCount ? "disabled" : ""}>次へ</button>
  `;
  pagination.classList.remove("hidden");
}

function getVisiblePages(page, pageCount) {
  const pages = [];
  for (let i = 1; i <= pageCount; i += 1) {
    if (i === 1 || i === pageCount || Math.abs(i - page) <= 2) {
      pages.push(i);
    } else if (pages[pages.length - 1] !== "...") {
      pages.push("...");
    }
  }
  return pages;
}

function renderAuthorLinks(author) {
  const parts = String(author ?? "")
    .split(/[／/]+/)
    .map(part => part.trim())
    .filter(Boolean);

  if (parts.length === 0) return "";

  return parts
    .map(part => `<button class="author-link" type="button" data-author="${escAttr(part)}">${escHtml(part)}</button>`)
    .join(" / ");
}

function sortBooksByDate(books, order) {
  const direction = order === "date-asc" ? 1 : -1;
  return [...books].sort((a, b) => {
    const dateA = getDateValue(a.publishedDate);
    const dateB = getDateValue(b.publishedDate);
    if (dateA === dateB) return 0;
    if (dateA === Number.NEGATIVE_INFINITY) return 1;
    if (dateB === Number.NEGATIVE_INFINITY) return -1;
    return (dateA - dateB) * direction;
  });
}

function getDateValue(value) {
  const text = String(value ?? "");
  const match = text.match(/(\d{4})(?:[-/.年](\d{1,2}))?(?:[-/.月](\d{1,2}))?/);
  if (!match) return Number.NEGATIVE_INFINITY;

  const year = Number(match[1]);
  const month = Number(match[2] || 1);
  const day = Number(match[3] || 1);
  return new Date(year, month - 1, day).getTime();
}

function showLoading() {
  statusBar.classList.add("hidden");
  pagination.classList.add("hidden");
  pagination.innerHTML = "";
  content.innerHTML = `
    <div class="state-box">
      <div class="loading-dots" style="margin-bottom:16px">
        <span></span><span></span><span></span>
      </div>
      <p>検索中...</p>
    </div>`;
}

function showError(message) {
  statusBar.classList.add("hidden");
  pagination.classList.add("hidden");
  pagination.innerHTML = "";
  content.innerHTML = `
    <div class="state-box">
      <span class="icon">!</span>
      <p>${escHtml(message)}</p>
    </div>`;
}

function revealOverflowingSynopsisToggles() {
  document.querySelectorAll(".card-synopsis").forEach(synopsis => {
    const toggle = synopsis.nextElementSibling;
    if (!toggle?.classList.contains("synopsis-toggle")) return;

    const isOverflowing = synopsis.scrollHeight > synopsis.clientHeight + 1;
    toggle.classList.toggle("hidden", !isOverflowing);
  });
}

function escHtml(value) {
  return String(value ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function escAttr(value) {
  return escHtml(value).replace(/`/g, "&#96;");
}
</script>
