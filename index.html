<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>あらすじ検索 - 作家で探す小説</title>
<meta name="description" content="作家名やあらすじのキーワードから小説を探せる検索ツール。発売日順、ジャンル絞り込み、全文あらすじ表示に対応。">
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=Shippori+Mincho:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <div class="header-inner">
    <a class="logo" href="./index.html">あらすじ<span>検索</span></a>
    <div class="search-row">
      <select class="search-select" id="searchMode" aria-label="検索種別">
        <option value="author">作家で検索</option>
        <option value="synopsis">あらすじで検索</option>
      </select>
      <input class="search-input" id="searchInput" type="text" placeholder="作家名を入力" autocomplete="off">
      <button class="search-btn" id="searchBtn" type="button">検索</button>
    </div>
  </div>
</header>

<main>
  <div class="api-note hidden" id="apiNote">
    <span class="icon">!</span>
    <div>
      <strong>デモモード</strong> 現在はサンプルデータで動作しています。
      楽天Webサービスで <code>APP_ID</code> と <code>ACCESS_KEY</code> を取得し、スクリプト先頭の設定を書き換えると楽天ブックスAPIから実データを取得できます。
    </div>
  </div>

  <div class="status-bar hidden" id="statusBar">
    <span class="status-author" id="statusAuthor"></span>
    <span class="status-count" id="statusCount"></span>
    <span class="status-spacer"></span>
    <div class="result-controls">
      <label class="sort-control">
        並び順
        <select class="sort-select" id="sortSelect">
          <option value="date-desc">発売日 降順</option>
          <option value="date-asc">発売日 昇順</option>
        </select>
      </label>
      <div class="genre-filter hidden" id="genreFilter"></div>
    </div>
  </div>

  <div id="content">
    <div class="home-hero">
      <section class="hero-copy" aria-labelledby="heroTitle">
        <p class="hero-kicker">Novel Synopsis Finder</p>
        <h1 id="heroTitle">
          <span class="hero-line">読みたい一冊は、</span>
          <span class="hero-line">あらすじの中に</span>
          <span class="hero-line">隠れている。</span>
        </h1>
        <p class="hero-lead">好きな作家の作品を一覧で眺める。気になる言葉から物語を探す。タイトルを知らなくても、読みたい気分から小説に出会える検索サイトです。</p>
        <div class="quick-search-panel" aria-label="おすすめ検索">
          <div class="quick-search-group">
            <div class="quick-heading">
              <h2>作家名で検索</h2>
              <button class="quick-refresh" type="button" data-refresh-group="author" aria-label="作家名候補を更新">↻</button>
            </div>
            <div class="quick-searches" data-quick-group="author">
              <button class="quick-search" type="button"></button>
              <button class="quick-search" type="button"></button>
            </div>
          </div>
          <div class="quick-search-group">
            <div class="quick-heading">
              <h2>キーワードであらすじ検索</h2>
              <button class="quick-refresh" type="button" data-refresh-group="synopsis" aria-label="キーワード候補を更新">↻</button>
            </div>
            <div class="quick-searches" data-quick-group="synopsis">
              <button class="quick-search" type="button"></button>
              <button class="quick-search" type="button"></button>
              <button class="quick-search" type="button"></button>
            </div>
          </div>
        </div>
      </section>
    </div>
  </div>

  <div class="pagination hidden" id="pagination"></div>
</main>

<footer class="site-version">ver.22</footer>

<script src="app.js"></script>
</body>
</html>
